# AgentsFloor Widget — CDN Deploy
# Builds the Vite IIFE bundle and uploads dist/widget.js to GCP Cloud Storage.
# CDN: cdn.agentsfloor.com/widget/latest/widget.js
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GCP_SA_KEY    — Service account JSON key (raw JSON string), same SA as agents-floor
#   GCP_PROJECT_ID — GCP project ID (agents-floor-platform)

name: Deploy Widget to CDN

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy-widget:
    name: Build + Upload widget.js → cdn.agentsfloor.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build widget
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload widget.js to CDN bucket
        run: |
          gcloud storage cp dist/widget.js \
            gs://cdn.agentsfloor.com/widget/latest/widget.js \
            --cache-control="no-cache"
